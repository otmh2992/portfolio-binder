
# Cloudflare Workers Configuration for Portfolio Binder
# For more details: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "portfolio-binder"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]

# Account ID
account_id = "1df95eb7feda5b3b11847c2fe7781163"

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

# R2 Bucket Binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfoliovideos"

# KV Namespace for Sessions
# Note: Create KV namespace before deploying:
# wrangler kv:namespace create "SESSION"
# [[kv_namespaces]]
# binding = "SESSION"
# id = "your_kv_namespace_id"

# Environment Variables (non-sensitive)
[vars]
SUPABASE_URL = "https://ljlmsnqdtwhrrdbxgptz.supabase.co"
R2_BUCKET_NAME = "portfoliovideos"
CLOUDFLARE_ACCOUNT_ID = "1df95eb7feda5b3b11847c2fe7781163"

# NOTE: Sensitive keys should be added via Wrangler CLI:
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put R2_ACCESS_KEY_ID
# wrangler secret put R2_SECRET_ACCESS_KEY
# wrangler secret put TMDB_API_KEY

# For local development, these can be set in .dev.vars file

